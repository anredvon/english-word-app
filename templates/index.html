<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>🦖 지훈이의 영어단어</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Jua&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script defer src="/static/app.js"></script>
</head>
<body>

  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div id="feedbackOverlay" class="feedback-overlay"></div>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <div class="app-icon">🦖</div>
        <div class="header-text">
          <h1>지훈이의 영어단어</h1>
          <p>오늘도 신나게 공부해보자! 💪</p>
        </div>
      </div>
      <button id="btnStats" class="stats-btn">
        <span>📊</span><span>통계</span>
      </button>
    </div>
  </header>

  <main>
    <aside class="sidebar">

      <div class="card">
        <div class="card-header">
          <span class="card-icon">✏️</span>
          <h2>단어 등록</h2>
        </div>
        <form id="wordForm">
          <div class="field-group">
            <label>영어 단어</label>
            <input id="word" type="text" placeholder="apple" required>
          </div>
          <div class="field-group">
            <label>한국어 뜻</label>
            <input id="meaning" type="text" placeholder="사과" required>
          </div>
          <div class="field-group">
            <label>예문 <span class="optional">선택</span></label>
            <input id="example" type="text" placeholder="I like apples.">
          </div>
          <div class="field-group">
            <label>등록일</label>
            <input id="regDate" type="date">
          </div>
          <button type="submit" class="btn-primary full">➕ 단어 추가</button>
        </form>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-icon">📋</span>
          <h2>대량 등록</h2>
          <button id="toggleBulk" class="toggle-btn">열기</button>
        </div>
        <div id="bulkSection" class="hidden">
          <p class="hint-text">💡 <code>apple - 사과 | I like an apple.</code></p>
          <textarea id="bulkInput" placeholder="한 줄에 단어 하나씩&#10;apple - 사과&#10;banana - 바나나"></textarea>
          <div class="field-group mt12">
            <label>등록일</label>
            <input type="date" id="bulkDate">
          </div>
          <div class="btn-row mt12">
            <button id="bulkParse" class="btn-ghost">🔍 미리보기</button>
            <button id="bulkApply" class="btn-primary" disabled>✅ 등록</button>
            <span id="bulkSpinner" class="hidden">⏳</span>
          </div>
          <div id="bulkStatus" class="bulk-status"></div>
          <ul id="bulkPreview" class="bulk-preview-list"></ul>
        </div>
      </div>

    </aside>

    <section class="content">

      <div class="control-bar">
        <div class="control-left">
          <div class="search-wrap">
            <span class="search-ico">🔍</span>
            <input id="search" type="text" placeholder="단어 또는 뜻 검색...">
          </div>
          <input id="filterDate" type="date" class="date-input">
          <button id="loadByDate" class="btn-secondary">📅 조회</button>
        </div>
        <div class="control-right">
          <select id="quizMode">
            <option value="en2ko">영어 → 한국어</option>
            <option value="ko2en">한국어 → 영어</option>
            <option value="cloze">빈칸 채우기</option>
            <option value="en2ko_input">영어 → 한국어 (주관식)</option>
            <option value="ko2en_input">한국어 → 영어 (주관식)</option>
            <option value="cloze_input">빈칸 채우기 (주관식)</option>
          </select>
          <button id="btnQuiz" class="btn-quiz">🎮 퀴즈 시작!</button>
        </div>
      </div>

      <ul id="wordList" class="word-grid"></ul>

    </section>
  </main>

  <footer><p>🦖 지훈이의 영어단어 앱 · Made with ❤️</p></footer>

  <!-- 퀴즈 모달 -->
  <div id="quizModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-body quiz-modal">
      <div class="modal-header">
        <div class="modal-title">🎮 퀴즈</div>
        <button id="quizClose" class="close-btn">✕</button>
      </div>
      <div class="progress-track">
        <div id="quizProgressBar" class="progress-fill"></div>
      </div>
      <div class="quiz-meta">
        <span id="qCount">1/10</span>
        <span id="qScore">점수 0</span>
      </div>
      <div id="qWord" class="quiz-question">—</div>
      <div id="qChoices" class="choices-grid"></div>
      <div id="qInputWrap" class="quiz-input-wrap hidden">
        <input id="qInput" type="text" placeholder="정답을 입력하세요">
        <button id="qSubmit" class="btn-primary">제출 ✔</button>
      </div>
      <div class="quiz-footer">
        <button id="qNext" class="btn-primary" disabled>다음 ➡</button>
        <button id="qRestart" class="btn-ghost sm">🔄 처음부터</button>
        <button id="qWrongOnly" class="btn-ghost sm" disabled>❌ 오답만</button>
      </div>
    </div>
  </div>

  <!-- 통계 모달 -->
  <div id="statsModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-body stats-modal">
      <div class="modal-header">
        <div class="modal-title">📊 학습 통계</div>
        <button id="statsClose" class="close-btn">✕</button>
      </div>
      <div class="stats-grid">
        <div class="stat-tile">
          <div class="stat-emoji">📚</div>
          <div class="stat-val" id="stTotal">0</div>
          <div class="stat-lbl">총 단어</div>
        </div>
        <div class="stat-tile">
          <div class="stat-emoji">🎯</div>
          <div class="stat-val" id="stAcc">0%</div>
          <div class="stat-lbl">정답률</div>
        </div>
        <div class="stat-tile">
          <div class="stat-emoji">🌟</div>
          <div class="stat-val" id="stToday">0</div>
          <div class="stat-lbl">오늘 등록</div>
        </div>
      </div>
    </div>
  </div>

  <div id="toastMsg" class="toast"></div>
</body>
</html>
