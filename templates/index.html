<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>🦖 지훈이의 신나는 영어단어 학습</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script defer src="/static/app.js"></script>
</head>
<body>

  <!-- 피드백 오버레이 -->
  <div id="feedbackOverlay" class="feedback-overlay"></div>

  <header>
    <div class="header-inner">
      <div class="dino-wrap">🦖</div>
      <div>
        <h1>지훈이의 신나는 영어단어!</h1>
        <p>단어등록 · 카드 확인 · 다양한 퀴즈 Mode</p>
      </div>
    </div>
  </header>

  <main>
    <div class="container">

      <!-- 단일 단어 등록 -->
      <section class="panel">
        <h2>📥 단어 등록</h2>
        <form id="wordForm">
          <div class="row wrap gap">
            <input id="word" type="text" placeholder="영어 단어" required>
            <input id="meaning" type="text" placeholder="한국어 뜻" required>
            <input id="regDate" type="date">
            <button type="submit" class="accent">➕ 추가</button>
          </div>
          <div class="row mt8">
            <input id="example" type="text" placeholder="예문 (선택 사항)" style="width:100%">
          </div>
        </form>
      </section>

      <!-- 대량 등록 -->
      <section class="panel">
        <h2>✏️ 대량 등록</h2>
        <div class="row gap">
          <button id="toggleBulk" class="accent">📂 열기</button>
          <button id="btnStats" class="ghost">📊 통계 보기</button>
        </div>

        <div id="bulkSection" class="hidden">
          <p class="hint">형식: <code>apple - 사과 | I like an apple.</code> (한 줄에 하나)</p>
          <textarea id="bulkInput" placeholder="apple - 사과 | I like an apple.&#10;banana - 바나나"></textarea>
          <div class="row gap mt8">
            <input type="date" id="bulkDate">
            <button id="bulkParse" class="ghost">🔍 미리보기</button>
            <button id="bulkApply" class="accent" disabled>✅ 등록</button>
            <span id="bulkSpinner" class="hidden">⏳</span>
          </div>
          <div id="bulkStatus" class="bulk-status"></div>
          <ul id="bulkPreview"></ul>
        </div>
      </section>

      <!-- 단어 카드 -->
      <section class="panel">
        <h2>📚 단어 카드</h2>
        <div class="row wrap gap">
          <input id="filterDate" type="date">
          <button id="loadByDate" class="accent">📅 날짜 조회</button>
          <input id="search" type="text" placeholder="🔍 검색 (단어/뜻)">
          <select id="quizMode">
            <option value="en2ko">영어 ➝ 한국어</option>
            <option value="ko2en">한국어 ➝ 영어</option>
            <option value="cloze">빈칸 채우기</option>
            <option value="en2ko_input">영어 ➝ 한국어 (주관식)</option>
            <option value="ko2en_input">한국어 ➝ 영어 (주관식)</option>
            <option value="cloze_input">빈칸 채우기 (주관식)</option>
          </select>
          <button id="btnQuiz" class="accent">🎮 퀴즈 시작!</button>
        </div>
        <ul id="wordList"></ul>
      </section>

    </div>
  </main>

  <footer>
    <p>🦖 © 2025 JiHun English Word App. 화이팅! 💪</p>
  </footer>

  <!-- 퀴즈 모달 -->
  <div id="quizModal" class="modal hidden">
    <div class="modal-body">
      <div class="modal-head">
        <strong>🎮 퀴즈</strong>
        <button id="quizClose" class="ghost sm">✕ 닫기</button>
      </div>

      <!-- 진행바 -->
      <div class="progress-wrap">
        <div id="quizProgressBar" class="progress-bar"></div>
      </div>

      <div class="quiz-stat">
        <span id="qCount">0/0</span>
        <span id="qScore">점수 0</span>
      </div>

      <div id="qWord" class="qword">—</div>
      <div id="qChoices" class="choices"></div>

      <!-- 주관식 입력 -->
      <div id="qInputWrap" class="hidden">
        <input id="qInput" type="text" placeholder="정답을 입력하세요">
        <button id="qSubmit" class="accent">제출 ✔</button>
      </div>

      <div class="quiz-actions">
        <button id="qNext" class="accent" disabled>다음 ➡</button>
        <button id="qRestart" class="ghost sm">🔄 처음부터</button>
        <button id="qWrongOnly" class="ghost sm" disabled>❌ 오답만 다시</button>
      </div>
    </div>
  </div>

  <!-- 통계 모달 -->
  <div id="statsModal" class="modal hidden">
    <div class="modal-body">
      <div class="modal-head">
        <strong>📊 학습 통계</strong>
        <button id="statsClose" class="ghost sm">✕ 닫기</button>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="stTotal">0</div>
          <div class="stat-label">총 단어</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stAcc">0%</div>
          <div class="stat-label">정답률</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stToday">0</div>
          <div class="stat-label">오늘 등록</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div id="toastMsg" class="toast"></div>

</body>
</html>
